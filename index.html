<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NoteOS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --hud:#00d4ff;--hud2:#0088ff;--hud3:#ff6b00;
  --bg:#020b18;--bg2:#041428;--bg3:#061e38;
  --card:#061e38;--border:rgba(0,212,255,0.25);
  --text:#c8eeff;--text2:#6bb8d4;--text3:#2a6a8a;
  --glow:0 0 20px rgba(0,212,255,0.3);
  --glow2:0 0 40px rgba(0,212,255,0.15);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Scanline overlay */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.015) 2px,rgba(0,212,255,0.015) 4px);pointer-events:none;z-index:1000}

/* Corner decorations */
body::after{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 0% 0%,rgba(0,212,255,0.08) 0%,transparent 50%),
  radial-gradient(ellipse at 100% 100%,rgba(0,136,255,0.06) 0%,transparent 50%);pointer-events:none;z-index:0}

/* HUD corners */
.hud-corner{position:fixed;width:60px;height:60px;pointer-events:none;z-index:999}
.hud-corner::before,.hud-corner::after{content:'';position:absolute;background:var(--hud)}
.hud-corner::before{width:2px;height:30px}
.hud-corner::after{width:30px;height:2px}
.hud-tl{top:0;left:0}.hud-tl::before{top:0;left:0}.hud-tl::after{top:0;left:0}
.hud-tr{top:0;right:0}.hud-tr::before{top:0;right:0}.hud-tr::after{top:0;right:0}
.hud-bl{bottom:0;left:0}.hud-bl::before{bottom:0;left:0}.hud-bl::after{bottom:0;left:0}
.hud-br{bottom:0;right:0}.hud-br::before{bottom:0;right:0}.hud-br::after{bottom:0;right:0}

/* Top bar */
#topbar{display:flex;align-items:center;padding:8px 20px;gap:16px;border-bottom:1px solid var(--border);background:rgba(2,11,24,0.9);backdrop-filter:blur(10px);flex-shrink:0;z-index:100;position:relative}
.logo{display:flex;align-items:center;gap:10px;color:var(--hud);font-weight:700;font-size:1rem;letter-spacing:2px;text-transform:uppercase}
.logo-icon{width:28px;height:28px;border:2px solid var(--hud);transform:rotate(45deg);display:flex;align-items:center;justify-content:center;box-shadow:var(--glow)}
.logo-icon span{transform:rotate(-45deg);font-size:.7rem;display:block}
.top-spacer{flex:1}
.hud-stat{display:flex;flex-direction:column;align-items:center;padding:0 12px;border-left:1px solid var(--border)}
.hud-stat-val{font-size:.85rem;color:var(--hud);font-weight:600;font-variant-numeric:tabular-nums}
.hud-stat-lbl{font-size:.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
#search-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 14px;border-radius:2px;font-size:.75rem;cursor:pointer;letter-spacing:1px;transition:all .2s}
#search-btn:hover{border-color:var(--hud);color:var(--hud);box-shadow:var(--glow)}
#user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px;border:1px solid var(--border);border-radius:2px;cursor:pointer}
#user-avatar{width:22px;height:22px;border-radius:50%;border:1px solid var(--hud)}
#user-name{font-size:.7rem;color:var(--text2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#signout-btn{background:none;border:none;color:var(--text3);font-size:.65rem;cursor:pointer;letter-spacing:1px;padding:2px 6px}
#signout-btn:hover{color:var(--hud3)}

/* Toolbar */
#toolbar{display:flex;align-items:center;gap:1px;padding:4px 16px;border-bottom:1px solid var(--border);background:rgba(4,20,40,0.95);flex-shrink:0;flex-wrap:wrap;z-index:99;position:relative}
.tb{background:none;border:none;color:var(--text2);padding:3px 8px;font-size:.72rem;cursor:pointer;border-radius:1px;transition:all .15s;letter-spacing:.5px;position:relative}
.tb:hover{color:var(--hud);background:rgba(0,212,255,0.08)}
.tb::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--hud);transition:width .2s}
.tb:hover::after{width:100%}
.tb-sep{width:1px;height:16px;background:var(--border);margin:0 3px}
.tb-sel{background:rgba(0,212,255,0.05);border:1px solid var(--border);color:var(--text2);padding:2px 6px;font-size:.7rem;border-radius:1px;outline:none}
.tb-sel:focus{border-color:var(--hud)}
option{background:var(--bg2)}

/* Main layout */
#main{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}

/* Notebook panel */
#nb-panel{width:180px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(4,20,40,0.8);backdrop-filter:blur(5px);transition:width .3s}
#nb-panel.collapsed{width:0;overflow:hidden}
.panel-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border)}
.panel-hd span{font-size:.6rem;color:var(--hud);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.panel-add{background:none;border:1px solid var(--border);color:var(--text2);width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;transition:all .2s}
.panel-add:hover{border-color:var(--hud);color:var(--hud);box-shadow:var(--glow)}
.panel-list{flex:1;overflow-y:auto}
.panel-list::-webkit-scrollbar{width:2px}
.panel-list::-webkit-scrollbar-track{background:transparent}
.panel-list::-webkit-scrollbar-thumb{background:var(--hud2)}

/* Notebook items */
.nb-item{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;border-left:2px solid transparent;transition:all .2s;position:relative}
.nb-item:hover{background:rgba(0,212,255,0.05);border-left-color:var(--text3)}
.nb-item.active{background:rgba(0,212,255,0.08);border-left-color:var(--hud)}
.nb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.iname{font-size:.72rem;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.3px}
.nb-item.active .iname{color:var(--hud)}
.del-x{background:none;border:none;color:var(--text3);font-size:.6rem;cursor:pointer;opacity:0;padding:0 2px;transition:all .2s}
.nb-item:hover .del-x{opacity:1}
.del-x:hover{color:#ff4444}
.iname-inp{flex:1;background:rgba(0,212,255,0.1);border:1px solid var(--hud);color:var(--hud);font-size:.72rem;padding:1px 4px;outline:none;border-radius:1px}

/* Section panel */
#sec-panel{width:155px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(6,30,56,0.8);transition:width .3s}
#sec-panel.collapsed{width:0;overflow:hidden}
.sec-item{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;border-left:2px solid transparent;transition:all .2s}
.sec-item:hover{background:rgba(0,136,255,0.05);border-left-color:var(--text3)}
.sec-item.active{background:rgba(0,136,255,0.1);border-left-color:var(--hud2)}
.sec-item.active .iname{color:var(--hud2)}
.sec-dot{width:5px;height:5px;border-radius:1px;flex-shrink:0}

/* Page panel */
#pg-panel{width:210px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(4,20,40,0.9);transition:width .3s}
#pg-panel.collapsed{width:0;overflow:hidden}
.pg-item{display:flex;flex-direction:column;padding:10px 12px;cursor:pointer;border-left:2px solid transparent;border-bottom:1px solid rgba(0,212,255,0.06);transition:all .2s}
.pg-item:hover{background:rgba(0,212,255,0.04)}
.pg-item.active{background:rgba(0,212,255,0.08);border-left-color:var(--hud)}
.pg-top{display:flex;align-items:center;gap:6px}
.pg-ico{font-size:.7rem;color:var(--text3)}
.pg-name{font-size:.72rem;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pg-item.active .pg-name{color:var(--hud)}
.pg-date{font-size:.6rem;color:var(--text3);margin-top:3px;padding-left:16px;letter-spacing:.3px}
.pg-tags{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px;padding-left:16px}
.ptag{font-size:.55rem;background:rgba(0,212,255,0.1);color:var(--hud);padding:1px 5px;border-radius:1px;border:1px solid rgba(0,212,255,0.2)}

/* Editor */
#editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* 3D canvas background */
#canvas-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.grid-line-h,.grid-line-v{position:absolute;background:rgba(0,212,255,0.04)}
.grid-line-h{height:1px;width:100%}
.grid-line-v{width:1px;height:100%}

#page-header{padding:20px 32px 14px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;background:rgba(2,11,24,0.7);backdrop-filter:blur(10px)}
#page-header::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--hud),var(--hud2))}
#page-title{width:100%;font-size:1.5rem;font-weight:700;color:var(--hud);border:none;outline:none;background:transparent;font-family:inherit;letter-spacing:1px}
#page-title::placeholder{color:var(--text3)}
#page-meta{display:flex;align-items:center;gap:16px;margin-top:6px;flex-wrap:wrap}
#page-date{font-size:.65rem;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
#page-tags-row{display:flex;gap:5px;flex-wrap:wrap}
.tag-chip{font-size:.62rem;background:rgba(0,212,255,0.1);color:var(--hud);padding:2px 8px;border:1px solid rgba(0,212,255,0.25);cursor:pointer;transition:all .2s;letter-spacing:.5px}
.tag-chip:hover{background:rgba(255,100,0,0.15);color:var(--hud3);border-color:var(--hud3)}

#editor-scroll{flex:1;overflow-y:auto;position:relative}
#editor-scroll::-webkit-scrollbar{width:3px}
#editor-scroll::-webkit-scrollbar-thumb{background:var(--hud2);border-radius:2px}
#editor{min-height:100%;padding:24px 32px;outline:none;font-size:.88rem;line-height:1.8;color:var(--text);font-family:'Calibri','Segoe UI',system-ui,sans-serif;position:relative;z-index:1}
#editor h1{font-size:1.5rem;font-weight:700;color:var(--hud);margin:16px 0 8px;letter-spacing:1px}
#editor h2{font-size:1.2rem;font-weight:600;color:var(--hud2);margin:12px 0 6px}
#editor h3{font-size:1rem;font-weight:600;color:var(--text);margin:10px 0 4px}
#editor ul,#editor ol{padding-left:24px;margin:4px 0;color:var(--text2)}
#editor table{border-collapse:collapse;margin:12px 0;width:100%}
#editor td,#editor th{border:1px solid var(--border);padding:8px 12px;color:var(--text2)}
#editor th{background:rgba(0,212,255,0.08);color:var(--hud)}
#editor img{max-width:100%;border-radius:2px;margin:8px 0;border:1px solid var(--border)}
#editor a{color:var(--hud2);text-decoration:none;border-bottom:1px solid var(--hud2)}
#editor p{color:var(--text2)}
#editor:empty::before{content:'// BEGIN TRANSMISSION...';color:var(--text3);font-style:italic;letter-spacing:1px}

/* Status bar */
#statusbar{display:flex;align-items:center;gap:16px;padding:5px 24px;border-top:1px solid var(--border);background:rgba(2,11,24,0.95);flex-shrink:0;font-size:.62rem;letter-spacing:.8px;text-transform:uppercase}
.s-dot{width:5px;height:5px;border-radius:50%;background:#00ff88;display:inline-block;margin-right:5px;box-shadow:0 0 6px #00ff88}
.s-dot.saving{background:var(--hud3);box-shadow:0 0 6px var(--hud3);animation:pulse .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#sstatus{color:var(--text3)}
#wcount{color:var(--text3)}
.s-spacer{flex:1}
.stbtn{background:none;border:none;color:var(--text3);font-size:.62rem;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;transition:color .2s}
.stbtn:hover{color:var(--hud)}

/* Empty state */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;position:relative;z-index:1}
.es-hud{width:120px;height:120px;border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;animation:rotate 8s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}
.es-hud::before{content:'';position:absolute;inset:8px;border:1px solid rgba(0,212,255,0.15);border-radius:50%;animation:rotate 4s linear infinite reverse}
.es-hud::after{content:'';position:absolute;width:8px;height:8px;background:var(--hud);border-radius:50%;top:-4px;left:50%;transform:translateX(-50%);box-shadow:var(--glow)}
.es-icon{font-size:2rem;color:var(--text3);animation:none}
.es-text{color:var(--text3);font-size:.75rem;letter-spacing:2px;text-transform:uppercase}
.es-sub{color:var(--text3);font-size:.62rem;letter-spacing:1px;opacity:.6}

/* Search overlay */
#search-overlay{display:none;position:fixed;inset:0;background:rgba(2,11,24,0.85);z-index:500;align-items:flex-start;justify-content:center;padding-top:80px;backdrop-filter:blur(4px)}
#search-overlay.open{display:flex}
#search-box{background:var(--bg2);border:1px solid var(--border);width:100%;max-width:560px;box-shadow:var(--glow2)}
#search-wrap{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border)}
#search-wrap span{color:var(--hud);font-size:.85rem}
#search-input{flex:1;background:none;border:none;outline:none;font-size:.9rem;color:var(--hud);letter-spacing:.5px}
#search-input::placeholder{color:var(--text3)}
#search-results{max-height:340px;overflow-y:auto}
.sr-item{display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;border-bottom:1px solid rgba(0,212,255,0.06);transition:background .15s}
.sr-item:hover{background:rgba(0,212,255,0.06)}
.sr-ico{color:var(--text3);font-size:.8rem;width:16px}
.sr-title{font-size:.8rem;font-weight:500;color:var(--text)}
.sr-path{font-size:.65rem;color:var(--text3);letter-spacing:.5px}

/* Share modal */
#share-modal{display:none;position:fixed;inset:0;background:rgba(2,11,24,0.9);z-index:600;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#share-modal.open{display:flex}
#share-box{background:var(--bg2);border:1px solid var(--border);padding:28px;width:440px;position:relative;box-shadow:var(--glow2)}
#share-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--hud),var(--hud2))}
#share-box h3{font-size:.9rem;color:var(--hud);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
#share-box p{font-size:.72rem;color:var(--text3);margin-bottom:16px;letter-spacing:.5px}
#share-inp{width:100%;background:rgba(0,212,255,0.05);border:1px solid var(--border);color:var(--text2);padding:8px 12px;font-size:.75rem;outline:none;margin-bottom:12px;font-family:monospace}
.share-acts{display:flex;gap:8px}
.sbtn{flex:1;padding:8px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text2);letter-spacing:1px;text-transform:uppercase;transition:all .2s}
#copy-btn{border-color:var(--hud);color:var(--hud)}
#copy-btn:hover{background:rgba(0,212,255,0.1);box-shadow:var(--glow)}
#close-share-btn:hover{border-color:var(--text2);color:var(--text)}

/* Popups */
.popup{display:none;position:absolute;background:var(--bg2);border:1px solid var(--border);z-index:200;box-shadow:var(--glow2)}
.popup.open{display:block}
#tbl-picker{padding:10px;top:100%;left:0}
#tbl-label{font-size:.62rem;color:var(--text3);text-align:center;margin-bottom:6px;letter-spacing:1px}
#tbl-grid{display:grid;grid-template-columns:repeat(8,16px);gap:2px}
.tgc{width:16px;height:16px;border:1px solid var(--border);cursor:pointer;transition:all .1s}
.tgc.on{background:rgba(0,212,255,0.3);border-color:var(--hud)}
#em-picker{padding:8px;width:196px;top:100%;left:0}
#em-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.embtn{font-size:1rem;background:none;border:none;cursor:pointer;padding:2px;transition:background .1s}
.embtn:hover{background:rgba(0,212,255,0.1)}
#tag-picker{width:170px;top:100%;left:0}
.tag-opt{display:block;width:100%;text-align:left;padding:8px 14px;font-size:.72rem;background:none;border:none;cursor:pointer;color:var(--text2);letter-spacing:.5px;border-bottom:1px solid rgba(0,212,255,0.06);transition:all .15s}
.tag-opt:hover{background:rgba(0,212,255,0.06);color:var(--hud)}

/* Loading */
#loading{display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading.show{display:flex}
.load-ring{width:60px;height:60px;border:2px solid var(--border);border-top-color:var(--hud);border-radius:50%;animation:spin .8s linear infinite;box-shadow:var(--glow)}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:.7rem;color:var(--text3);letter-spacing:3px;text-transform:uppercase}

/* Signin */
#signin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:var(--bg);position:fixed;inset:0;z-index:900}
#signin-screen::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.02) 2px,rgba(0,212,255,0.02) 4px)}
.signin-logo{width:80px;height:80px;border:2px solid var(--hud);transform:rotate(45deg);display:flex;align-items:center;justify-content:center;margin-bottom:32px;box-shadow:var(--glow),inset 0 0 20px rgba(0,212,255,0.1);animation:hud-pulse 2s ease-in-out infinite}
@keyframes hud-pulse{0%,100%{box-shadow:var(--glow),inset 0 0 20px rgba(0,212,255,0.1)}50%{box-shadow:0 0 40px rgba(0,212,255,0.5),inset 0 0 30px rgba(0,212,255,0.2)}}
.signin-logo span{transform:rotate(-45deg);font-size:1.8rem;display:block}
.signin-title{font-size:2rem;font-weight:700;color:var(--hud);letter-spacing:6px;text-transform:uppercase;margin-bottom:4px;position:relative;z-index:1}
.signin-sub{font-size:.7rem;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:40px;position:relative;z-index:1}
#signin-btn{display:flex;align-items:center;gap:12px;background:none;border:1px solid var(--hud);color:var(--hud);padding:12px 28px;font-size:.8rem;font-weight:600;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .3s;position:relative;z-index:1}
#signin-btn:hover{background:rgba(0,212,255,0.1);box-shadow:var(--glow);transform:translateY(-1px)}
#signin-btn img{width:18px;height:18px;filter:brightness(2)}
.hud-line{width:200px;height:1px;background:linear-gradient(to right,transparent,var(--hud),transparent);margin:24px 0;position:relative;z-index:1}

/* Card floating effect on hover */
.nb-item,.sec-item,.pg-item{transition:all .2s}
</style>
</head>
<body>

<div class="hud-corner hud-tl"></div>
<div class="hud-corner hud-tr"></div>
<div class="hud-corner hud-bl"></div>
<div class="hud-corner hud-br"></div>

<div id="loading">
  <div class="load-ring"></div>
  <div class="load-txt">Initializing system...</div>
</div>

<div id="signin-screen">
  <div class="signin-logo"><span>&#9670;</span></div>
  <div class="signin-title">NoteOS</div>
  <div class="signin-sub">Intelligent Note System v2.0</div>
  <div class="hud-line"></div>
  <button id="signin-btn">
    <img src="https://www.google.com/favicon.ico" alt="G"/>
    Authenticate with Google
  </button>
</div>

<div id="app">
  <div id="topbar">
    <div class="logo">
      <div class="logo-icon"><span>&#9670;</span></div>
      NoteOS
    </div>
    <div class="top-spacer"></div>
    <div class="hud-stat"><div class="hud-stat-val" id="nb-count">0</div><div class="hud-stat-lbl">Notebooks</div></div>
    <div class="hud-stat"><div class="hud-stat-val" id="pg-count">0</div><div class="hud-stat-lbl">Pages</div></div>
    <button id="search-btn">&#9776; SEARCH [CTRL+K]</button>
    <div id="user-chip">
      <img id="user-avatar" src="" alt=""/>
      <span id="user-name"></span>
      <button id="signout-btn">EXIT</button>
    </div>
  </div>

  <div id="toolbar">
    <select class="tb-sel" id="fnt-fam" style="width:100px">
      <option>Calibri</option><option>Arial</option><option>Georgia</option>
      <option>Courier New</option><option>Verdana</option>
    </select>
    <select class="tb-sel" id="fnt-sz" style="width:50px">
      <option>8</option><option>10</option><option selected>12</option>
      <option>14</option><option>16</option><option>18</option><option>20</option><option>24</option>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyA8jlNtC5Gjgy5rohUfyBA5BY1rA_8xztc",
  authDomain:"onenote-app-faa3c.firebaseapp.com",

});
var auth=firebase.auth();
var db=firebase.firestore();
var SV=firebase.firestore.FieldValue.serverTimestamp;
var NB_C=["#00d4ff","#0088ff","#ff6b00","#00ff88","#c478ff","#ff3366"];
var SC_C=["#0088ff","#00d4ff","#ff6b00","#00ff88","#c478ff","#ff3366"];
var TAGS=["Important","Question","Idea","Remember","Done","Urgent","Work","Goal"];
var EMOJ=["😀","📝","✅","⭐","💡","❓","📌","🔥","💬","📅","🎯","🔑","💼","📊","🔗","📎","🗒️","💾","🏷️","🔔","📧","🌐","🎉","✨","🚀","💯"];
var uid=null,notebooks=[],sections=[],pages=[];
var activeNb=null,activeSec=null,activePg=null;
var unsubs=[],saveTimer=null;

function gel(id){return document.getElementById(id);}
function nowStr(){return new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"});}
function showLoad(v){gel("loading").className=v?"show":"";}
function nbCol(){return db.collection("users/"+uid+"/notebooks");}
function scCol(nb){return db.collection("users/"+uid+"/notebooks/"+nb+"/sections");}
function pgCol(nb,sc){return db.collection("users/"+uid+"/notebooks/"+nb+"/sections/"+sc+"/pages");}
function mkObj(d){var o={id:d.id},data=d.data(),k;for(k in data){if(data.hasOwnProperty(k))o[k]=data[k];}return o;}

// Build grid background
function buildGrid(){
  var bg=gel("canvas-bg"),w=window.innerWidth,h=window.innerHeight,i,el;
  bg.innerHTML="";
  for(i=0;i<h;i+=40){el=document.createElement("div");el.className="grid-line-h";el.style.top=i+"px";bg.appendChild(el);}
  for(i=0;i<w;i+=40){el=document.createElement("div");el.className="grid-line-v";el.style.left=i+"px";bg.appendChild(el);}
}
buildGrid();

// Auth
gel("signin-btn").onclick=function(){
  showLoad(true);
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(function(e){console.error(e);showLoad(false);});
};
gel("signout-btn").onclick=function(){
  var i;for(i=0;i<unsubs.length;i++){unsubs[i]();}auth.signOut();
};
firebase.auth().onAuthStateChanged(function(user){
  if(user){
    uid=user.uid;
    gel("user-avatar").src=user.photoURL||"";
    gel("user-name").textContent=user.displayName||user.email;
    gel("signin-screen").style.display="none";
    gel("app").style.display="flex";
    loadNbs();
  } else {
    uid=null;notebooks=[];sections=[];pages=[];
    activeNb=activeSec=activePg=null;
    gel("signin-screen").style.display="flex";
    gel("app").style.display="none";
    showLoad(false);
  }
});

function updateCounts(){
  gel("nb-count").textContent=notebooks.length;
  gel("pg-count").textContent=pages.length;
}

function loadNbs(){
  showLoad(true);
  var i;for(i=0;i<unsubs.length;i++){unsubs[i]();}unsubs=[];
  var u=nbCol().orderBy("createdAt").onSnapshot(function(snap){
    notebooks=[];
    var j;for(j=0;j<snap.docs.length;j++){notebooks.push(mkObj(snap.docs[j]));}
    renderNbs();updateCounts();showLoad(false);
    if(!activeNb&&notebooks.length>0){selNb(notebooks[0].id);}
    else if(notebooks.length===0){sections=[];pages=[];renderSecs();renderPgs();showEmpty();}
  });
  unsubs.push(u);
}
function loadSecs(nbId){
  var u=scCol(nbId).orderBy("createdAt").onSnapshot(function(snap){
    sections=[];
    var j;for(j=0;j<snap.docs.length;j++){sections.push(mkObj(snap.docs[j]));}
    renderSecs();
    if(!activeSec&&sections.length>0){selSec(sections[0].id);}
    else if(sections.length===0){pages=[];renderPgs();showEmpty();}
  });
  unsubs.push(u);
}
function loadPgs(nbId,scId){
  var u=pgCol(nbId,scId).orderBy("createdAt").onSnapshot(function(snap){
    pages=[];
    var j;for(j=0;j<snap.docs.length;j++){pages.push(mkObj(snap.docs[j]));}
    renderPgs();updateCounts();
    if(!activePg&&pages.length>0){selPg(pages[0].id);}
    else if(pages.length===0){showEmpty();}
  });
  unsubs.push(u);
}

function renderNbs(){
  var list=gel("nb-list");list.innerHTML="";
  var i;
  for(i=0;i<notebooks.length;i++){
    (function(nb){
      var d=document.createElement("div");
      d.className="nb-item"+(nb.id===activeNb?" active":"");
      var dot=document.createElement("div");dot.className="nb-dot";dot.style.background=nb.color;dot.style.color=nb.color;
      var name=document.createElement("span");name.className="iname";name.textContent=nb.name;
      var del=document.createElement("button");del.className="del-x";del.textContent="x";
      d.appendChild(dot);d.appendChild(name);d.appendChild(del);
      name.ondblclick=function(){startRename("nb",nb.id,nb.name,d);};
      del.onclick=function(e){e.stopPropagation();delNb(nb.id);};
      d.onclick=function(){selNb(nb.id);};
      list.appendChild(d);
    })(notebooks[i]);
  }
}
function renderSecs(){
  var list=gel("sec-list");list.innerHTML="";
  var i;
  for(i=0;i<sections.length;i++){
    (function(sec){
      var d=document.createElement("div");
      d.className="sec-item"+(sec.id===activeSec?" active":"");
      var dot=document.createElement("div");dot.className="dot sec-dot";dot.style.background=sec.color;
      var name=document.createElement("span");name.className="iname";name.textContent=sec.name;
      var del=document.createElement("button");del.className="del-x";del.textContent="x";
      d.appendChild(dot);d.appendChild(name);d.appendChild(del);
      name.ondblclick=function(){startRename("sec",sec.id,sec.name,d);};
      del.onclick=function(e){e.stopPropagation();delSec(sec.id);};
      d.onclick=function(){selSec(sec.id);};
      list.appendChild(d);
    })(sections[i]);
  }
}
function renderPgs(){
  var list=gel("pg-list");list.innerHTML="";
  var i;
  for(i=0;i<pages.length;i++){
    (function(pg){
      var d=document.createElement("div");
      d.className="pg-item"+(pg.id===activePg?" active":"");
      var top=document.createElement("div");top.className="pg-top";
      var ico=document.createElement("span");ico.className="pg-ico";ico.textContent=">";
      var name=document.createElement("span");name.className="pg-name";name.textContent=pg.name;
      var del=document.createElement("button");del.className="del-x";del.textContent="x";
      top.appendChild(ico);top.appendChild(name);top.appendChild(del);
      var dt=document.createElement("div");dt.className="pg-date";dt.textContent=pg.updatedAt||"";
      d.appendChild(top);d.appendChild(dt);
      if(pg.tags&&pg.tags.length>0){
        var tr=document.createElement("div");tr.className="pg-tags";
        var ti;for(ti=0;ti<pg.tags.length;ti++){var tc=document.createElement("span");tc.className="ptag";tc.textContent=pg.tags[ti];tr.appendChild(tc);}
        d.appendChild(tr);
      }
      name.ondblclick=function(){startRename("pg",pg.id,pg.name,d);};
      del.onclick=function(e){e.stopPropagation();delPg(pg.id);};
      d.onclick=function(){selPg(pg.id);};
      list.appendChild(d);
    })(pages[i]);
  }
}

function selNb(id){
  activeNb=id;activeSec=null;activePg=null;sections=[];pages=[];
  renderNbs();renderSecs();renderPgs();showEmpty();loadSecs(id);
}
function selSec(id){
  activeSec=id;activePg=null;pages=[];
  renderSecs();renderPgs();showEmpty();loadPgs(activeNb,id);
}
function selPg(id){
  activePg=id;renderPgs();
  var pg=null,i;
  for(i=0;i<pages.length;i++){if(pages[i].id===id){pg=pages[i];break;}}
  if(!pg)return;
  gel("page-header").style.display="block";
  gel("empty-state").style.display="none";
  gel("editor").style.display="block";
  gel("page-title").value=pg.name||"";
  gel("page-date").textContent=pg.updatedAt?"// EDITED: "+pg.updatedAt:"";
  gel("editor").innerHTML=pg.content||"";
  renderTagsRow(pg.tags||[]);
  updateWC();
  setTimeout(function(){gel("editor").focus();},50);
}
function showEmpty(){
  gel("page-header").style.display="none";
  gel("editor").style.display="none";
  gel("empty-state").style.display="flex";
}

gel("add-nb").onclick=function(){nbCol().doc().set({name:"New Notebook",color:NB_C[notebooks.length%NB_C.length],createdAt:SV(),ownerId:uid});};
gel("add-sec").onclick=function(){if(!activeNb)return;scCol(activeNb).doc().set({name:"New Section",color:SC_C[sections.length%SC_C.length],createdAt:SV()});};
gel("add-pg").onclick=function(){if(!activeNb||!activeSec)return;pgCol(activeNb,activeSec).doc().set({name:"Untitled Page",content:"",tags:[],createdAt:SV(),updatedAt:nowStr()});};

function delNb(id){if(!confirm("Delete notebook?"))return;nbCol().doc(id).delete();if(activeNb===id){activeNb=null;activeSec=null;activePg=null;}}
function delSec(id){if(!confirm("Delete section?"))return;scCol(activeNb).doc(id).delete();if(activeSec===id){activeSec=null;activePg=null;}}
function delPg(id){if(!confirm("Delete page?"))return;pgCol(activeNb,activeSec).doc(id).delete();if(activePg===id){activePg=null;showEmpty();}}

function startRename(type,id,current,container){
  var nameEl=container.querySelector(".iname")||container.querySelector(".pg-name");
  var inp=document.createElement("input");inp.className="iname-inp";inp.value=current;
  nameEl.parentNode.replaceChild(inp,nameEl);inp.focus();inp.select();
  function commit(){
    var v=inp.value.trim()||current;
    if(type==="nb")nbCol().doc(id).update({name:v});
    else if(type==="sec")scCol(activeNb).doc(id).update({name:v});
    else if(type==="pg")pgCol(activeNb,activeSec).doc(id).update({name:v});
  }
  inp.onblur=commit;
  inp.onkeydown=function(e){if(e.key==="Enter")inp.blur();else if(e.key==="Escape"){inp.value=current;inp.blur();}};
}

function schedSave(){setSS("saving");clearTimeout(saveTimer);saveTimer=setTimeout(doSave,900);}
function doSave(){
  if(!activePg||!activeNb||!activeSec)return;
  var now=nowStr();
  pgCol(activeNb,activeSec).doc(activePg).update({content:gel("editor").innerHTML,name:gel("page-title").value||"Untitled Page",updatedAt:now});
  setSS("saved");gel("page-date").textContent="// EDITED: "+now;
}
function setSS(s){
  if(s==="saving"){gel("sdot").className="s-dot saving";gel("sstatus").textContent="SAVING...";}
  else{gel("sdot").className="s-dot";gel("sstatus").textContent="SYNCED";}
}
gel("editor").oninput=function(){schedSave();updateWC();};
gel("page-title").oninput=schedSave;
function updateWC(){var t=gel("editor").innerText||"";gel("wcount").textContent=(t.trim()?t.trim().split(/\s+/).length:0)+" WORDS";}

function renderTagsRow(tags){
  var row=gel("page-tags-row");row.innerHTML="";
  var i;
  for(i=0;i<tags.length;i++){
    (function(tag){
      var chip=document.createElement("span");chip.className="tag-chip";chip.textContent=tag+" x";
      chip.onclick=function(){removeTag(tag);};row.appendChild(chip);
    })(tags[i]);
  }
}
function removeTag(tag){
  var pg=null,i;
  for(i=0;i<pages.length;i++){if(pages[i].id===activePg){pg=pages[i];break;}}
  if(!pg)return;
  var tags=[],j;for(j=0;j<(pg.tags||[]).length;j++){if(pg.tags[j]!==tag)tags.push(pg.tags[j]);}
  pgCol(activeNb,activeSec).doc(activePg).update({tags:tags});renderTagsRow(tags);
}
function addTag(tag){
  var pg=null,i;
  for(i=0;i<pages.length;i++){if(pages[i].id===activePg){pg=pages[i];break;}}
  if(!pg)return;
  var existing=pg.tags||[],found=false,j;
  for(j=0;j<existing.length;j++){if(existing[j]===tag){found=true;break;}}
  if(!found)existing=existing.concat([tag]);
  pgCol(activeNb,activeSec).doc(activePg).update({tags:existing});renderTagsRow(existing);
}

function xCmd(c){document.execCommand(c,false,null);}
function xFmt(t){document.execCommand("formatBlock",false,t);}

  var r=new FileReader();r.onload=function(ev){document.execCommand("insertHTML",false,'<img src="'+ev.target.result+'" style="max-width:100%;border:1px solid rgba(0,212,255,0.3);margin:8px 0"/>');};r.readAsDataURL(f);
};

// Table picker
var i;
for(i=0;i<64;i++){
  (function(idx){
    var r=Math.floor(idx/8)+1,c=(idx%8)+1;
    var cell=document.createElement("div");cell.className="tgc";
    cell.onmouseenter=function(){
      gel("tbl-label").textContent=r+" x "+c;
      var cells=gel("tbl-grid").children,j;
      for(j=0;j<cells.length;j++){if(Math.floor(j/8)<r&&j%8<c)cells[j].classList.add("on");else cells[j].classList.remove("on");}
    };
    cell.onclick=function(){
      var html="<table>",a,b;
      for(a=0;a<r;a++){html+="<tr>";for(b=0;b<c;b++)html+="<td>&nbsp;</td>";html+="</tr>";}
      html+="</table><p></p>";
      document.execCommand("insertHTML",false,html);
      gel("tbl-picker").classList.remove("open");
    };
    gel("tbl-grid").appendChild(cell);
  })(i);
}
gel("btn-tbl").onclick=function(e){e.stopPropagation();gel("tbl-picker").classList.toggle("open");};

// Emoji
var ei;
for(ei=0;ei<EMOJ.length;ei++){
  (function(em){
    var b=document.createElement("button");b.className="embtn";b.textContent=em;
    b.onclick=function(){document.execCommand("insertText",false,em);gel("em-picker").classList.remove("open");};
    gel("em-grid").appendChild(b);
  })(EMOJ[ei]);
}
gel("btn-em").onclick=function(e){e.stopPropagation();gel("em-picker").classList.toggle("open");};

// Tags
var ti;
for(ti=0;ti<TAGS.length;ti++){
  (function(tag){
    var b=document.createElement("button");b.className="tag-opt";b.textContent=tag;
    b.onclick=function(){addTag(tag);gel("tag-picker").classList.remove("open");};
    gel("tag-picker").appendChild(b);
  })(TAGS[ti]);
}
gel("btn-tag").onclick=function(e){e.stopPropagation();gel("tag-picker").classList.toggle("open");};

document.onclick=function(){
  gel("tbl-picker").classList.remove("open");
  gel("em-picker").classList.remove("open");
  gel("tag-picker").classList.remove("open");
};

// Search
gel("search-btn").onclick=openSearch;
document.addEventListener("keydown",function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();openSearch();}
  if(e.key==="Escape"){gel("search-overlay").classList.remove("open");gel("share-modal").classList.remove("open");}
});
function openSearch(){gel("search-overlay").classList.add("open");gel("search-input").value="";gel("search-results").innerHTML="";setTimeout(function(){gel("search-input").focus();},50);}
gel("search-overlay").onclick=function(e){if(e.target===gel("search-overlay"))gel("search-overlay").classList.remove("open");};
gel("search-input").oninput=function(){
  var q=gel("search-input").value.trim();
  if(q.length<2){gel("search-results").innerHTML="";return;}
  gel("search-results").innerHTML='<div style="padding:12px 18px;color:var(--text3);font-size:.72rem;letter-spacing:1px">SCANNING...</div>';
  var results=[],nbIdx=0,nbCopy=notebooks.slice();
  function nextNb(){
    if(nbIdx>=nbCopy.length){showSR(results);return;}
    var nb=nbCopy[nbIdx++];
    scCol(nb.id).get().then(function(ss){
      var scIdx=0;
      function nextSc(){
        if(scIdx>=ss.docs.length){nextNb();return;}
        var sd=ss.docs[scIdx++],sc=mkObj(sd);
        pgCol(nb.id,sd.id).get().then(function(ps){
          var pi;
          for(pi=0;pi<ps.docs.length;pi++){
            var pg=mkObj(ps.docs[pi]),ql=q.toLowerCase();
            if((pg.name||"").toLowerCase().indexOf(ql)!==-1||(pg.content||"").toLowerCase().indexOf(ql)!==-1){results.push({nb:nb,sc:sc,pg:pg});}
          }
          nextSc();
        });
      }
      nextSc();
    });
  }
  nextNb();
};
function showSR(results){
  var el=gel("search-results");el.innerHTML="";
  if(!results.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:.72rem;letter-spacing:1px">NO RESULTS FOUND</div>';return;}
  var max=results.length<10?results.length:10,i;
  for(i=0;i<max;i++){
    (function(item){
      var d=document.createElement("div");d.className="sr-item";
      var ico=document.createElement("div");ico.className="sr-ico";ico.textContent=">";
      var info=document.createElement("div");
      var title=document.createElement("div");title.className="sr-title";title.textContent=item.pg.name;
      var path=document.createElement("div");path.className="sr-path";path.textContent=item.nb.name+" > "+item.sc.name;
      info.appendChild(title);info.appendChild(path);d.appendChild(ico);d.appendChild(info);
      d.onclick=function(){
        gel("search-overlay").classList.remove("open");
        selNb(item.nb.id);
        setTimeout(function(){selSec(item.sc.id);setTimeout(function(){selPg(item.pg.id);},400);},400);
      };
      el.appendChild(d);
    })(results[i]);
  }
}

// Share
gel("btn-share").onclick=function(){
  if(!activeNb)return;
  var nb=null,i;for(i=0;i<notebooks.length;i++){if(notebooks[i].id===activeNb){nb=notebooks[i];break;}}
  if(!nb)return;
  var user=auth.currentUser,ownerName=user?(user.displayName||")":"";
  db.collection("shared").doc(activeNb).set({notebookId:activeNb,ownerId:uid,ownerName:ownerName,notebookName:nb.name,sharedAt:SV()});
  gel("share-inp").value=location.origin+location.pathname+"?share="+activeNb;
  gel("share-modal").classList.add("open");
};
gel("copy-btn").onclick=function(){navigator.clipboard.writeText(gel("share-inp").value);gel("copy-btn").textContent="COPIED!";setTimeout(function(){gel("copy-btn").textContent="Copy Link";},2000);};
gel("close-share-btn").onclick=function(){gel("share-modal").classList.remove("open");};

// Panel toggles
function mkToggle(btnId,panelId,label){
  gel(btnId).onclick=function(){
    var p=gel(panelId),hidden=p.classList.contains("collapsed");
    if(hidden)p.classList.remove("collapsed");else p.classList.add("collapsed");
    gel(btnId).style.color=hidden?"var(--hud)":"var(--text3)";
  };
}
mkToggle("tog-nb","nb-panel","NB");
mkToggle("tog-sec","sec-panel","SEC");
mkToggle("tog-pg","pg-panel","PG");
</script>
